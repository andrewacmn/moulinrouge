<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#loading-screen{position:fixed;inset:0;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:900}
.spinner{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}

#error-screen{position:fixed;inset:0;background:#f8fafc;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px;text-align:center}
#error-screen h2{font-size:16px;font-weight:700}
#error-screen p{font-size:12px;color:#64748b;max-width:440px;line-height:1.5}
#error-screen code{font-size:11px;color:#ef4444;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 12px;max-width:440px;word-break:break-all;display:block}
.retry-btn{height:32px;padding:0 16px;background:#3b82f6;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
#app{display:none;flex-direction:column;height:100vh}
#header{background:#fff;border-bottom:1px solid #e2e8f0;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#header h1{font-size:15px;font-weight:700;color:#0f172a}

#nav{display:flex;align-items:center;gap:6px}
.nav-btn{width:26px;height:26px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;cursor:pointer;font-size:16px;color:#64748b;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f8fafc}
#week-label{font-size:12px;font-weight:600;color:#1e293b;min-width:180px;text-align:center}
.hbtn{height:26px;padding:0 10px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#475569;font-family:inherit}

#cal-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
#cal-head{display:flex;flex-shrink:0;background:#fff;border-bottom:2px solid #e2e8f0;z-index:20}

.ch-day.today .ch-daycount{color:#3b82f6}
#cal-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
#cal-grid{display:flex;position:relative;background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 63px,#f1f5f9 63px,#f1f5f9 64px);background-position:56px 0;background-size:calc(100% - 56px) 64px}
#time-gutter{width:56px;flex-shrink:0;position:relative;border-right:1px solid #e2e8f0}
.tl{position:absolute;right:7px;font-size:9px;font-weight:500;color:#94a3b8;transform:translateY(-50%);white-space:nowrap}
#now-bar{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:15;pointer-events:none;display:none}

.day-col{position:relative;border-right:1px solid #f1f5f9}

.cal-ev{position:absolute;left:3px;right:3px;background:#fff;border:1px solid #e2e8f0;border-radius:7px;overflow:hidden;cursor:pointer;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:box-shadow .15s,transform .1s;display:flex;flex-direction:column;min-height:60px}

.cal-ev-bar{height:3px;flex-shrink:0}

.cal-ev-body{padding:4px 6px 5px;flex:1;display:flex;flex-direction:column;gap:2px}
.cal-ev-toprow{display:flex;align-items:center;justify-content:space-between;gap:3px}
.cal-ev-time{font-size:9px;font-weight:600;color:#64748b}

.cal-ev-title{font-size:10px;font-weight:600;color:#1e293b;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

<script>
'use strict';

var $ = function(id){ return document.getElementById(id); };

// ── Constants ──────────────────────────────────────────────
var HOUR_H = 64, START_H = 6, END_H = 23;
var TOTAL_H = (END_H - START_H) * HOUR_H;
var DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── Error display ──────────────────────────────────────────
window.onerror = function(msg, src, line) {
  showError('JavaScript Error', msg + ' (line ' + line + ')');
};
window.onunhandledrejection = function(e) {
  showError('Error', String(e.reason || e));
};

function showError(title, msg) {
  $('loading-screen').style.display = 'none';
  $('error-screen').style.display = 'flex';
  $('err-title').textContent = title || 'Error';
  $('err-msg').textContent = msg || '';
}
function setMsg(t) { $('load-msg').textContent = t; }

// ── Timezone / Date ────────────────────────────────────────
function parseDateTime(val) {
  if (!val) return {};
  try {
    var p = JSON.parse(val);
    if (!p.date) return {};
    var hour = null, min = null;
    if (p.time) {
      var utcDt = new Date('2000-06-15T' + p.time + 'Z');
      try {
        var hStr = utcDt.toLocaleString('en-US', { timeZone: CONFIG.timezone, hour: 'numeric', hour12: false });
        var mStr = utcDt.toLocaleString('en-US', { timeZone: CONFIG.timezone, minute: '2-digit' });
        hour = parseInt(hStr, 10) % 24;
        min  = parseInt(mStr, 10);
      } catch(e) {
        hour = parseInt(p.time.split(':')[0], 10);
        min  = parseInt(p.time.split(':')[1], 10);
      }
    }
    return { date: p.date, hour: hour, min: min, dateObj: new Date(p.date + 'T00:00:00') };
  } catch(e) { return {}; }
}

function fmt12(hour, min) {
  if (hour === null || hour === undefined) return '';
  var h = hour % 12 || 12;
  var m = String(min || 0).padStart(2, '0');
  return h + ':' + m + ' ' + (hour < 12 ? 'AM' : 'PM');
}

function timeToY(hour, min) {
  if (hour === null || hour === undefined) return 0;
  return Math.max(0, ((hour + (min || 0) / 60) - START_H) * HOUR_H);
}

// ── Dropbox URL ────────────────────────────────────────────
function toDirectUrl(url) {
  if (!url || typeof url !== 'string') return null;
  var u = url.trim();
  if (!u.startsWith('http')) return null;
  if (!u.includes('dropbox.com')) return u;
  u = u.replace('www.dropbox.com', 'dl.dropboxusercontent.com');
  u = u.replace(/([?&])dl=\d(&|$)/, function(m, pre, post) { return post === '&' ? pre : ''; });
  u = u.replace(/[?&]$/, '');
  return u;
}

// ── File type ──────────────────────────────────────────────
function getExt(asset) {
  if (asset.extension) return asset.extension.toLowerCase().replace('.','');
  return (asset.url || '').split('?')[0].split('.').pop().toLowerCase();
}
var IMG_RE = /^(jpg|jpeg|png|gif|webp|svg|bmp|tiff|heic)$/;
var VID_RE = /^(mp4|webm|mov|avi|mkv|m4v|wmv)$/;
function assetType(asset) {
  var ext = getExt(asset);
  var path = (asset.url || '').split('?')[0].toLowerCase();
  return {
    img: IMG_RE.test(ext) || IMG_RE.test(path.split('.').pop()),
    vid: VID_RE.test(ext) || VID_RE.test(path.split('.').pop())
  };
}

// ── Normalise assets ───────────────────────────────────────
function normaliseAssets(raw) {
  if (!raw) return [];
  var wrap = function(x, i) {
    if (!x) return null;
    if (typeof x === 'string') {
      var ut = x.trim();
      if (!ut.startsWith('http')) return null;
      return { id: 's'+i, name: ut.split('/').pop().split('?')[0] || 'File', url: ut, extension: ut.split('?')[0].split('.').pop() || '' };
    }
    var url = [x.url, x.linkUrl, x.link, x.publicUrl, x.public_url, x.shareUrl, x.linkToFile]
      .map(function(v){ return (typeof v === 'string' ? v.trim() : ''); })
      .find(function(v){ return v && v.startsWith('http'); }) || '';
    if (!url) return null;
    return {
      id: x.id ? String(x.id) : 'a'+i,
      name: x.name || url.split('/').pop().split('?')[0] || 'File',
      url: url,
      extension: x.extension || x.file_extension || url.split('?')[0].split('.').pop() || ''
    };
  };
  var items = Array.isArray(raw) ? raw : [raw];
  return items.map(wrap).filter(Boolean);
}

// ── Extract files from column value ───────────────────────
function extractFiles(val, itemName) {
  if (!val) return [];
  try {
    var p = JSON.parse(val);
    if (p.files && Array.isArray(p.files)) {
      return p.files.flatMap(function(f, i) {
        var url = [f.linkToFile, f.url, f.linkUrl, f.link, f.publicUrl]
          .map(function(v){ return (typeof v === 'string' ? v.trim() : ''); })
          .find(function(v){ return v && v.startsWith('http'); });
        if (!url) return [];
        return [{ id: f.assetId ? String(f.assetId) : 'f'+i, name: f.name || 'File', url: url, extension: (f.name||url.split('?')[0]).split('.').pop()||'' }];
      });
    }
    if (p.url && typeof p.url === 'string' && p.url.startsWith('http')) {
      return [{ id: 'link0', name: p.text || 'File', url: p.url, extension: p.url.split('?')[0].split('.').pop()||'' }];
    }
  } catch(e) {}
  return [];
}

// ── Group / Status colours ─────────────────────────────────

  'scheduled':'#22c55e','on hold':'#94a3b8','cancelled':'#ef4444'
};
function groupColour(g) { return GROUP_COLS[(g||'').toLowerCase()] || '#64748b'; }
function statusColour(s) {

    'amends required':'#f97316','changes requested':'#f97316','in production':'#a855f7',

// ── Column map ─────────────────────────────────────────────
var COL_KEY = 'cc_v9_' + (CONFIG.boardId || 'x');
var saveMap = function(m) { try { localStorage.setItem(COL_KEY, JSON.stringify(m)); } catch(e){} };
var loadMap = function() { try { return JSON.parse(localStorage.getItem(COL_KEY)); } catch(e){ return null; } };

function autoMap(cols) {

    filesCol: find(function(c){ return c.type === 'file'; }) || find(function(c){ return /final.asset|asset|file/i.test(c.title); }),
    typeCol:  find(function(c){ return /content.?type/i.test(c.title); }),
    netCol:   find(function(c){ return /network|platform/i.test(c.title); }),
    copyCol:  find(function(c){ return /push.?copy|^copy$|caption/i.test(c.title); }),
    explCol:  find(function(c){ return /explanation/i.test(c.title); }),
    linkCol:  find(function(c){ return /concept.*link/i.test(c.title) || (c.type === 'link' && /link/i.test(c.title)); }),
    estCol:   find(function(c){ return /estimate/i.test(c.title); })
  };
}

// ── API ────────────────────────────────────────────────────
function api(query) {
  return fetch('https://api.monday.com/v2', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': CONFIG.apiToken, 'API-Version': '2024-01' },
    body: JSON.stringify({ query: query })
  }).then(function(r) {
    if (!r.ok) throw new Error('monday.com HTTP ' + r.status);
    return r.json();
  }).then(function(j) {
    if (j.errors && j.errors.length) throw new Error(j.errors[0].message);
    return j.data;
  });
}

function fetchColumns() {
  return api('{ boards(ids:[' + CONFIG.boardId + ']) { columns { id title type } } }')
    .then(function(d) {
      var cols = d && d.boards && d.boards[0] && d.boards[0].columns;
      if (!cols || !cols.length) throw new Error('Board not found. Check your board ID.');
      return cols;
    });
}

function fetchItems(colMap) {
  var ids = JSON.stringify(Object.values(colMap).filter(Boolean).filter(function(v,i,a){ return a.indexOf(v)===i; }));
  return api('{ boards(ids:[' + CONFIG.boardId + ']) { items_page(limit:500) { items { id name group { id title color } assets { id name url public_url file_extension } column_values(ids:' + ids + ') { id value text } } } } }')
    .then(function(d) { return (d && d.boards && d.boards[0] && d.boards[0].items_page && d.boards[0].items_page.items) || []; });
}

function fetchDetail(itemId) {
  return api('{ items(ids:[' + itemId + ']) { id name group { id title color } assets { id name url public_url file_extension } updates(limit:50) { id text_body created_at creator { id name } replies { id text_body created_at creator { id name } } } column_values { id value text } } }')
    .then(function(d) { return (d && d.items && d.items[0]) || null; });
}

function postComment(itemId, text) {
  return api('mutation { create_update(item_id: ' + itemId + ', body: ' + JSON.stringify(text) + ') { id } }');
}

function postReply(updateId, text) {
  return api('mutation { create_reply(update_id: ' + updateId + ', body: ' + JSON.stringify(text) + ') { id } }');
}

function updateCol(itemId, columnId, value) {
  return api('mutation { change_simple_column_value(item_id:' + itemId + ', board_id:' + CONFIG.boardId + ', column_id:"' + columnId + '", value:' + JSON.stringify(value) + ') { id } }');
}

function fetchUsers() {
  return api('{ users(limit:100) { id name photo_thumb } }')
    .then(function(d) { return (d && d.users) || []; })
    .catch(function(){ return []; });
}

// ── Parse item ─────────────────────────────────────────────
function parseItem(raw, colMap) {
  var out = {
    id: raw.id, name: raw.name,
    groupTitle: (raw.group && raw.group.title) || '',
    assets: normaliseAssets(raw.assets),
    scheduledDate: null, scheduledDateObj: null,
    scheduledHour: null, scheduledMin: null, scheduledTimeStr: '',
    contentType: [], network: [],
    pushCopy: '', conceptExpl: '', conceptLink: '', conceptEst: '',
    updates: raw.updates || [],
    _rawCols: raw.column_values || []
  };
  var cv = raw.column_values || [];
  cv.forEach(function(col) {
    var val = col.value, text = (col.text || '').trim();
    if (col.id === colMap.dateCol && val) {
      var dt = parseDateTime(val);
      out.scheduledDate = dt.date; out.scheduledDateObj = dt.dateObj;
      out.scheduledHour = dt.hour; out.scheduledMin = dt.min;
      out.scheduledTimeStr = fmt12(dt.hour, dt.min);
    }
    if (col.id === colMap.copyCol)  out.pushCopy    = text;
    if (col.id === colMap.explCol)  out.conceptExpl = text;
    if (col.id === colMap.estCol)   out.conceptEst  = text;
    if (col.id === colMap.typeCol && text) out.contentType = text.split(', ').filter(Boolean);
    if (col.id === colMap.netCol  && text) out.network     = text.split(', ').filter(Boolean);
    if (col.id === colMap.linkCol && val) {
      try { var lp = JSON.parse(val); out.conceptLink = lp.url || lp.text || text; } catch(e) { out.conceptLink = text; }
    }
    if (col.id === colMap.filesCol) {
      var files = extractFiles(val, raw.name);
      if (files.length) out.assets = files;
    }
  });
  if (!out.assets.length) {
    for (var i = 0; i < cv.length; i++) {
      var files2 = extractFiles(cv[i].value, raw.name);
      if (files2.length) { out.assets = files2; break; }
    }
  }
  if (!out.assets.length && raw.assets && raw.assets.length) {
    out.assets = normaliseAssets(raw.assets);
  }
  return out;
}

// ── App state ──────────────────────────────────────────────
var allItems = [], allBoardCols = [], boardUsers = [], colMap = null;
var weekStart = getWeekStart();

function getWeekStart(d) {
  var x = new Date(d || new Date());
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0,0,0,0);
  return x;
}
function sameDay(a,b) { return a.toDateString() === b.toDateString(); }

// ── Boot ───────────────────────────────────────────────────
function boot() {
  if (!CONFIG.apiToken || CONFIG.apiToken === 'YOUR_API_TOKEN_HERE')
    return showError('API token not set', 'Open this file and paste your token into the CONFIG block at the top.');
  if (!CONFIG.boardId || CONFIG.boardId === 'YOUR_BOARD_ID_HERE')
    return showError('Board ID not set', 'Open this file and paste your board ID into the CONFIG block at the top.');
  setMsg('Loading columns...');
  fetchColumns()
    .then(function(cols) {
      allBoardCols = cols;
      colMap = loadMap() || autoMap(cols);
      saveMap(colMap);
      setMsg('Loading posts...');
      return fetchItems(colMap);
    })
    .then(function(raw) {
      allItems = raw.map(function(r){ return parseItem(r, colMap); }).filter(function(i){ return i.scheduledDate; });
      fetchUsers().then(function(u){ boardUsers = u; });
      $('loading-screen').style.display = 'none';
      $('app').style.display = 'flex';
      renderCalendar();
    })
    .catch(function(e) {
      console.error(e);
      showError('Failed to load', e.message || String(e));
    });
}

// ── Render calendar ────────────────────────────────────────
function renderCalendar() {
  var today = new Date();
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    days.push(d);
  }
  var last = days[6];
  var sm = weekStart.getMonth() === last.getMonth();
  $('week-label').textContent = sm
    ? weekStart.getDate() + ' ' + MONTHS[weekStart.getMonth()] + ' - ' + last.getDate() + ', ' + last.getFullYear()
    : weekStart.getDate() + ' ' + MONTHS[weekStart.getMonth()] + ' - ' + last.getDate() + ' ' + MONTHS[last.getMonth()] + ' ' + last.getFullYear();

  var hdr = $('cal-head');
  while (hdr.children.length > 1) hdr.removeChild(hdr.lastChild);
  var total = 0;
  days.forEach(function(day) {
    var items = allItems.filter(function(x){ return x.scheduledDateObj && sameDay(x.scheduledDateObj, day); });
    total += items.length;
    var isTd = sameDay(day, today);
    var div = document.createElement('div');
    div.className = 'ch-day' + (isTd ? ' today' : '');
    div.innerHTML = '<div class="ch-dayname">' + DAYS[day.getDay()] + '</div><div class="ch-daynum">' + day.getDate() + '</div>' + (items.length ? '<div class="ch-daycount">' + items.length + ' post' + (items.length !== 1 ? 's' : '') + '</div>' : '');
    hdr.appendChild(div);
  });
  $('week-summary').textContent = total + ' ' + (total === 1 ? 'post' : 'posts') + ' this week';

  var tg = $('time-gutter');
  tg.innerHTML = '';
  tg.style.minHeight = TOTAL_H + 'px';
  for (var h = START_H; h <= END_H; h++) {
    var lbl = document.createElement('div');
    lbl.className = 'tl';
    lbl.style.top = ((h - START_H) * HOUR_H) + 'px';
    lbl.textContent = (h % 12 || 12) + (h < 12 ? 'am' : 'pm');
    tg.appendChild(lbl);
  }

  var dg = $('days-grid');
  dg.innerHTML = '';
  dg.style.minHeight = TOTAL_H + 'px';
  days.forEach(function(day) {
    var isTd = sameDay(day, today);
    var dc = document.createElement('div');
    dc.className = 'day-col' + (isTd ? ' today' : '');
    dc.style.minHeight = TOTAL_H + 'px';
    allItems.filter(function(x){ return x.scheduledDateObj && sameDay(x.scheduledDateObj, day); })
            .forEach(function(item){ dc.appendChild(buildCalEvent(item)); });
    dg.appendChild(dc);
  });

  var nb = $('now-bar');
  if (days.some(function(d){ return sameDay(d, today); })) {
    var now = new Date();
    nb.style.display = 'block';
    nb.style.top = timeToY(now.getHours(), now.getMinutes()) + 'px';
    nb.style.left = '56px';
  } else {
    nb.style.display = 'none';
  }
}

// ── Build calendar event ───────────────────────────────────
function buildCalEvent(item) {
  var stage = cleanGroup(item.groupTitle) || 'Pending';
  var colour = groupColour(stage);
  var primary = item.assets[0] || null;
  var y = timeToY(item.scheduledHour, item.scheduledMin);

  var ev = document.createElement('div');
  ev.className = 'cal-ev';
  ev.style.top = y + 'px';
  ev.addEventListener('click', function(){ openPanel(item.id); });

  var bar = document.createElement('div');
  bar.className = 'cal-ev-bar';
  bar.style.background = colour;
  ev.appendChild(bar);

  var tw = document.createElement('div');
  tw.className = 'cal-ev-thumb';
  if (primary) {
    renderMedia(primary, tw, false);
  } else {
    tw.innerHTML = svgFile(20, '#d1d5db');
  }
  ev.appendChild(tw);

  var body = document.createElement('div');
  body.className = 'cal-ev-body';
  if (item.scheduledTimeStr || (item.contentType && item.contentType[0])) {
    var tr = document.createElement('div');
    tr.className = 'cal-ev-toprow';
    if (item.scheduledTimeStr) { var tt = document.createElement('div'); tt.className='cal-ev-time'; tt.textContent=item.scheduledTimeStr; tr.appendChild(tt); }
    if (item.contentType && item.contentType[0]) { var tp = document.createElement('div'); tp.className='cal-ev-type'; tp.textContent=item.contentType[0]; tr.appendChild(tp); }
    body.appendChild(tr);
  }
  var title = document.createElement('div');
  title.className = 'cal-ev-title';
  title.textContent = item.name;
  body.appendChild(title);

  var pill = document.createElement('div');
  pill.className = 'cal-ev-status';
  pill.style.cssText = 'background:' + colour + '1a;color:' + colour + ';';
  pill.textContent = stage;
  body.appendChild(pill);

  if (item.network && item.network.length) {
    var nets = document.createElement('div');
    nets.className = 'cal-ev-nets';
    item.network.slice(0,3).forEach(function(n){
      var t = document.createElement('span'); t.className='cal-ev-net'; t.textContent=n; nets.appendChild(t);
    });
    body.appendChild(nets);
  }
  ev.appendChild(body);
  return ev;
}

// ── Render media ───────────────────────────────────────────
function renderMedia(asset, container, fullSize) {
  var direct = toDirectUrl(asset.url);
  var types = assetType(asset);
  if (types.img && direct) {
    var img = document.createElement('img');
    img.src = direct; img.alt = asset.name;
    img.onerror = function(){ img.style.display='none'; };
    if (fullSize) img.style.cssText = 'width:100%;height:auto;max-height:320px;object-fit:contain;display:block;';
    container.appendChild(img);
  } else if (types.vid && direct) {
    var vid = document.createElement('video');
    vid.src = direct; vid.muted = true; vid.playsInline = true; vid.preload = 'metadata';
    if (!fullSize) { vid.addEventListener('loadedmetadata', function(){ vid.currentTime = 1; }, { once: true }); }
    if (fullSize) { vid.controls = true; }
    container.appendChild(vid);
  } else {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;width:100%;height:100%;padding:10px;';
    wrap.innerHTML = svgFile(fullSize ? 36 : 22, '#94a3b8') + '<span style="font-size:' + (fullSize?'11px':'8px') + ';color:#94a3b8;text-transform:uppercase;">' + esc(getExt(asset)||'file') + '</span>' + (fullSize && direct ? '<a href="' + esc(asset.url) + '" target="_blank" rel="noopener noreferrer" style="font-size:11px;color:#3b82f6;text-decoration:none;">Open file</a>' : '');
    container.appendChild(wrap);
  }
}

// ── Open/close panel ───────────────────────────────────────
function openPanel(itemId) {
  $('panel-title').textContent = '...';
  $('panel-body').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px;"><div class="spinner"></div><span style="font-size:11px;color:#94a3b8;">Loading...</span></div>';
  $('panel-overlay').style.display = 'block';
  $('panel').classList.add('open');
  if (!allBoardCols.length) {
    fetchColumns().then(function(cols){ allBoardCols = cols; return fetchDetail(itemId); }).then(renderDetailPanel).catch(function(e){ $('panel-body').innerHTML = '<p style="color:#ef4444;padding:16px;font-size:12px;">' + esc(e.message) + '</p>'; });
  } else {
    fetchDetail(itemId).then(renderDetailPanel).catch(function(e){ $('panel-body').innerHTML = '<p style="color:#ef4444;padding:16px;font-size:12px;">' + esc(e.message) + '</p>'; });
  }
}

function renderDetailPanel(raw) {
  if (!raw) { $('panel-body').innerHTML = '<p style="color:#ef4444;padding:16px;font-size:12px;">Item not found</p>'; return; }
  var item = parseItem(raw, colMap);
  $('panel-title').textContent = item.name;
  var pb = $('panel-body');
  pb.innerHTML = '';

  // Assets
  if (item.assets.length) {
    var lbl = el('div','p-sec-label'); lbl.textContent = 'Assets (' + item.assets.length + ')'; pb.appendChild(lbl);
    if (item.assets.length > 1) {
      var grid = el('div','p-assets-grid');
      item.assets.forEach(function(a){ grid.appendChild(buildAssetCard(a)); });
      pb.appendChild(grid);
    } else {
      var primary = item.assets[0];
      var wrap2 = el('div','p-preview');
      renderMedia(primary, wrap2, true);
      wrap2.style.cursor = 'pointer';
      wrap2.addEventListener('click', function(){ openLightbox(primary); });
      pb.appendChild(wrap2);
      var orow = el('div','p-open-row');
      var olink = document.createElement('a');
      olink.className = 'p-open-link'; olink.textContent = 'Open file';
      olink.addEventListener('click', function(e){ e.preventDefault(); window.open(primary.url,'_blank','noopener,noreferrer'); });
      orow.appendChild(olink); pb.appendChild(orow);
    }
  } else {
    var empty = el('div','p-preview-empty'); pb.appendChild(empty);
  }

  // Status dropdowns from all color/status columns
  try {
    var rawCV = item._rawCols || [];
    var statusFields = allBoardCols.map(function(c) {
      var match = rawCV.find(function(r){ return r.id === c.id; });
      var text = match ? (match.text || '').trim() : '';
      if (!text || !match || !match.value) return null;
      try {
        var v = JSON.parse(match.value);
        if (v && typeof v === 'object' && (v.index !== undefined || v.label !== undefined || v.style !== undefined)) {
          return { id: c.id, label: c.title, value: text };
        }
      } catch(e2) {}
      return null;
    }).filter(Boolean);
    if (statusFields.length) {
      pb.appendChild(pdiv());
      var row = el('div','p-status-row');
      statusFields.forEach(function(sf) {
        var field = el('div','p-field');
        var flbl = document.createElement('label'); flbl.textContent = sf.label; field.appendChild(flbl);
        var sel = document.createElement('select');
        var base = ['Pending','To Be Briefed','To Be Written','To Be Scheduled','Ready For Client Review','Ready for Client Review','In Production','Approved','Amends Required','On Hold','Cancelled','Scheduled'];
        var seen = {}; [sf.value].concat(base).forEach(function(o){ if(!seen[o]){seen[o]=1;sel.appendChild(new Option(o,o));} });
        sel.value = sf.value;
        sel.style.cssText = 'font-weight:600;color:' + statusColour(sf.value) + ';';
        (function(colId) {
          sel.addEventListener('change', function() {
            sel.style.cssText = 'font-weight:600;color:' + statusColour(sel.value) + ';';
            updateCol(item.id, colId, sel.value).catch(console.error);
          });
        })(sf.id);
        field.appendChild(sel); row.appendChild(field);
      });
      pb.appendChild(row);
    }
  } catch(e) { console.error('status error', e); }

  // Meta
  var meta = el('div','p-meta');
  if (item.scheduledDate) {
    var sd = new Date(item.scheduledDate + 'T00:00:00');
    var ds = sd.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
    if (item.scheduledTimeStr) ds += ' at ' + item.scheduledTimeStr;
    meta.appendChild(pmi('Scheduled', ds));
  }
  if (item.groupTitle) meta.appendChild(pmi('Stage', cleanGroup(item.groupTitle)));
  if (item.contentType && item.contentType[0]) meta.appendChild(pmi('Type', item.contentType[0]));
  if (item.network && item.network.length) {
    var nm = pmi('Networks',''); nm.classList.add('full');
    var nt = el('div','net-tags');
    item.network.forEach(function(n){ var t=el('span','net-tag');t.textContent=n;nt.appendChild(t); });
    nm.querySelector('.p-mi-v').appendChild(nt); meta.appendChild(nm);
  }
  if (meta.children.length) { pb.appendChild(pdiv()); pb.appendChild(meta); }

  // Text fields
  [ ['Concept Explanation', item.conceptExpl], ['Concept Estimate', item.conceptEst], ['Push Copy', item.pushCopy] ].forEach(function(pair) {
    if (!pair[1] || pair[1] === '-') return;
    pb.appendChild(pdiv());
    var tl = el('div','p-sec-label'); tl.textContent = pair[0]; pb.appendChild(tl);
    var tb = el('div','p-textbox'); tb.textContent = pair[1]; pb.appendChild(tb);
  });
  if (item.conceptLink) {
    pb.appendChild(pdiv());
    var cll = el('div','p-sec-label'); cll.textContent = 'Concept Link'; pb.appendChild(cll);
    var ca = document.createElement('a'); ca.className='p-link'; ca.textContent=item.conceptLink;
    ca.addEventListener('click', function(e){ e.preventDefault(); window.open(item.conceptLink,'_blank','noopener,noreferrer'); });
    pb.appendChild(ca);
  }

  // Comments
  pb.appendChild(pdiv());
  var totalR = item.updates.reduce(function(n,u){ return n+(u.replies?u.replies.length:0); },0);
  var cl = el('div','p-sec-label');
  cl.textContent = 'Updates (' + item.updates.length + ' comment' + (item.updates.length!==1?'s':'') + ', ' + totalR + ' repl' + (totalR!==1?'ies':'y') + ')';
  pb.appendChild(cl);
  var mi = makeMentionInput(3, 'Write an update... type @ to mention someone');
  pb.appendChild(mi.wrap);
  var csa = el('div','comment-send');
  var csb = document.createElement('button'); csb.className='post-btn'; csb.textContent='Post Update';
  csb.addEventListener('click', function() {
    var txt = mi.ta.getFormattedText().trim(); if (!txt) return;
    csb.disabled=true; csb.textContent='Posting...';
    postComment(item.id, txt).then(function(){ return openPanel(item.id); }).catch(function(e){ console.error(e); csb.disabled=false; csb.textContent='Post Update'; });
  });
  csa.appendChild(csb); pb.appendChild(csa);
  if (item.updates.length) {
    item.updates.forEach(function(u){ pb.appendChild(buildCommentItem(u, item.id)); });
  } else {
    var nc = el('div','no-comments'); nc.textContent='No updates yet'; pb.appendChild(nc);
  }
}

// ── Comment item with replies ──────────────────────────────
function buildCommentItem(u, itemId) {
  var ci = el('div','comment-item');
  var d = new Date(u.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'numeric',minute:'2-digit'});
  var head = el('div','comment-head');
  var auth = el('span','comment-author'); auth.textContent = (u.creator && u.creator.name) || 'Unknown';
  var dt = el('span','comment-date'); dt.textContent = d;
  head.appendChild(auth); head.appendChild(dt); ci.appendChild(head);
  var body = el('div','comment-body'); body.innerHTML = highlightMentions(esc(u.text_body||'')); ci.appendChild(body);
  var replies = u.replies || [];
  if (replies.length) {
    var rl = el('div','replies-list');
    replies.forEach(function(r) {
      var ri = el('div','reply-item');
      var rd = new Date(r.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'});
      var rh = el('div','comment-head');
      var ra = el('span','comment-author'); ra.textContent=(r.creator&&r.creator.name)||'Unknown';
      var rda = el('span','comment-date'); rda.textContent=rd;
      rh.appendChild(ra); rh.appendChild(rda);
      var rb = el('div','comment-body'); rb.innerHTML=highlightMentions(esc(r.text_body||''));
      ri.appendChild(rh); ri.appendChild(rb); rl.appendChild(ri);
    });
    ci.appendChild(rl);
  }
  var rBtn = document.createElement('button'); rBtn.className='comment-reply-btn';
  rBtn.textContent = replies.length ? 'Reply (' + replies.length + ')' : 'Reply';
  ci.appendChild(rBtn);
  var rf = el('div','reply-form');
  var rmi = makeMentionInput(2, 'Reply... type @ to mention');
  rf.appendChild(rmi.wrap);
  var racts = el('div','reply-form-actions');
  var rsend = document.createElement('button'); rsend.className='reply-btn'; rsend.textContent='Reply';
  var rcancel = document.createElement('button'); rcancel.className='reply-cancel'; rcancel.textContent='Cancel';
  rcancel.addEventListener('click', function(){ rf.classList.remove('open'); rmi.ta.value=''; });
  (function(updateId) {
    rsend.addEventListener('click', function() {
      var txt = rmi.ta.getFormattedText().trim(); if (!txt) return;
      rsend.disabled=true; rsend.textContent='Posting...';
      postReply(updateId, txt).then(function(){ return openPanel(itemId); }).catch(function(e){ console.error(e); rsend.disabled=false; rsend.textContent='Reply'; });
    });
  })(u.id);
  racts.appendChild(rcancel); racts.appendChild(rsend);
  rf.appendChild(racts); ci.appendChild(rf);
  rBtn.addEventListener('click', function(){ rf.classList.toggle('open'); if(rf.classList.contains('open')) rmi.ta.focus(); });
  return ci;
}

// ── Mention input ──────────────────────────────────────────
function makeMentionInput(rows, placeholder) {
  var wrap = el('div','mention-wrap');
  var ta = document.createElement('textarea');
  ta.rows = rows; ta.placeholder = placeholder;
  ta.style.cssText = 'width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:9px 11px;font-size:12px;font-family:inherit;resize:none;outline:none;line-height:1.5;';
  var dd = el('div','mention-dropdown');
  wrap.appendChild(ta); wrap.appendChild(dd);
  var mentionMap = {};

  function getQuery() {
    var pos = ta.selectionStart;
    var before = ta.value.slice(0, pos);
    var m = before.match(/@([\w\s]*)$/);
    return m ? { query: m[1].toLowerCase(), start: pos - m[0].length } : null;
  }
  function showDD(items, atStart) {
    dd.innerHTML = '';
    if (!items.length) { dd.classList.remove('open'); return; }
    items.forEach(function(u) {
      var item = el('div','mention-item');
      var av = el('div','mention-avatar');
      if (u.photo_thumb) { var img=document.createElement('img');img.src=u.photo_thumb;av.appendChild(img); }
      else av.textContent = u.name.split(' ').map(function(p){return p[0];}).join('').slice(0,2).toUpperCase();
      var nm = document.createElement('span'); nm.textContent = u.name;
      item.appendChild(av); item.appendChild(nm);
      item.addEventListener('mousedown', function(e) {
        e.preventDefault();
        var pos = ta.selectionStart;
        var before = ta.value.slice(0, atStart);
        var after  = ta.value.slice(pos);
        var ins = '@' + u.name + ' ';
        ta.value = before + ins + after;
        mentionMap[u.name] = u.id;
        ta.setSelectionRange(before.length+ins.length, before.length+ins.length);
        ta.focus();
        dd.classList.remove('open');
      });
      dd.appendChild(item);
    });
    var rect = ta.getBoundingClientRect();
    dd.style.left = rect.left + 'px';
    dd.style.top = (rect.bottom + 2) + 'px';
    dd.style.width = rect.width + 'px';
    dd.classList.add('open');
  }
  ta.addEventListener('input', function() {
    var q = getQuery();
    if (!q) { dd.classList.remove('open'); return; }
    var results = boardUsers.filter(function(u){ return u.name.toLowerCase().includes(q.query); }).slice(0,8);
    showDD(results, q.start);
  });
  ta.addEventListener('keydown', function(e) {
    if (!dd.classList.contains('open')) return;
    var items = dd.querySelectorAll('.mention-item');
    if (e.key==='Escape') dd.classList.remove('open');
  });
  document.addEventListener('click', function(e) { if (!wrap.contains(e.target)) dd.classList.remove('open'); }, true);
  ta.getFormattedText = function() {
    var text = ta.value;
    Object.keys(mentionMap).forEach(function(name) {
      text = text.split('@'+name).join('{@'+mentionMap[name]+'}');
    });
    return text;
  };
  return { wrap: wrap, ta: ta };
}

function highlightMentions(text) {
  return text.replace(/@([A-Za-z][A-Za-z0-9\s_-]{0,40})/g, '<span style="color:#3b82f6;font-weight:600;">@$1</span>');
}

// ── Asset card (multi-asset panel) ─────────────────────────
function buildAssetCard(asset) {
  var card = el('div','p-asset-card');
  card.addEventListener('click', function(){ openLightbox(asset); });
  var tw = el('div','p-asset-thumb'); renderMedia(asset, tw, false);
  var inf = el('div','p-asset-info');
  inf.innerHTML = '<div class="p-asset-name">' + esc(asset.name) + '</div><div class="p-asset-ext">' + esc(getExt(asset)||'file') + '</div>';
  card.appendChild(tw); card.appendChild(inf);
  return card;
}

// ── Lightbox ───────────────────────────────────────────────
function openLightbox(asset) {
  $('lb-name').textContent = asset.name;
  $('lb-open').onclick = function(e){ e.preventDefault(); window.open(asset.url,'_blank','noopener,noreferrer'); };
  var media = $('lb-media'); media.innerHTML = '';
  renderMedia(asset, media, true);
  $('lightbox').classList.add('open');
}
function closeLightbox() {
  var v = document.querySelector('#lb-media video');
  if (v) { v.pause(); v.src=''; }
  $('lightbox').classList.remove('open');
}

// ── Helpers ────────────────────────────────────────────────
function el(tag, cls) { var e=document.createElement(tag); if(cls) e.className=cls; return e; }
function pdiv() { return el('div','p-div'); }
function pmi(label, value) {
  var e=el('div','p-mi');
  e.innerHTML='<div class="p-mi-l">'+esc(label)+'</div><div class="p-mi-v">'+esc(String(value||''))+'</div>';
  return e;
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function svgFile(s,c) { return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'; }

// ── Events ─────────────────────────────────────────────────
$('btn-prev').addEventListener('click', function(){ weekStart.setDate(weekStart.getDate()-7); renderCalendar(); });
$('btn-next').addEventListener('click', function(){ weekStart.setDate(weekStart.getDate()+7); renderCalendar(); });
$('btn-today').addEventListener('click', function(){ weekStart=getWeekStart(); renderCalendar(); });
$('btn-refresh').addEventListener('click', function(){ $('app').style.display='none'; $('loading-screen').style.display='flex'; allItems=[]; boot(); });
$('panel-overlay').addEventListener('click', closePanel);
$('panel-x').addEventListener('click', closePanel);
$('lb-close').addEventListener('click', closeLightbox);
$('lightbox').addEventListener('click', function(e){ if(e.target===$('lightbox')) closeLightbox(); });
document.addEventListener('keydown', function(e) {
  if(e.key==='Escape'){ $('lightbox').classList.contains('open') ? closeLightbox() : closePanel(); }
});

boot();
</script>
