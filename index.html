<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monday Status Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
#app{display:flex;height:100vh}
#list{width:35%;background:#fff;border-right:1px solid #ddd;overflow:auto}
#panel{flex:1;padding:20px;overflow:auto}
.item{padding:12px;border-bottom:1px solid #eee;cursor:pointer}
.item:hover{background:#f9fafb}
.field{margin-bottom:16px}
label{font-size:12px;color:#6b7280;display:block;margin-bottom:6px}
select{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}
</style>
</head>
<body>

<script>
const CONFIG = {
  apiToken: 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjQ1NjA4NTcwMSwiYWFpIjoxMSwidWlkIjo2OTYyOTM1MSwiaWFkIjoiMjAyNS0wMS0xMFQwNjoyMTozMi4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6NjQzMTgxMCwicmduIjoidXNlMSJ9.CaVqnG51LtzKP4MTxXCflpqaZA64n0TvS6DzmK-7R84',
  boardId:  '18408062519'
};
</script>

<div id="app">
  <div id="list"></div>
  <div id="panel"><em>Select a job</em></div>
</div>

<script>
const $ = id => document.getElementById(id);

async function api(query){
  const res = await fetch('https://api.monday.com/v2',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':CONFIG.apiToken
    },
    body:JSON.stringify({query})
  });
  const json = await res.json();
  if(json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

let columns = [];
let items = [];

/* ========= STATUS HELPERS ========= */

function getStatusLabel(col, match){
  if(!match) return '';

  // ✅ FIX: text FIRST
  if(match.text && match.text.trim()){
    return match.text.trim();
  }

  // fallback
  if(match.value){
    try{
      const parsed = JSON.parse(match.value);

      if(parsed.label) return parsed.label;

      if(parsed.index !== undefined){
        const settings = JSON.parse(col.settings_str || '{}');
        return settings.labels?.[parsed.index] || '';
      }
    }catch(e){}
  }

  return '';
}

function getStatusOptions(col){
  try{
    const s = JSON.parse(col.settings_str || '{}');
    return Object.values(s.labels || {});
  }catch(e){
    return [];
  }
}

/* ========= INIT ========= */

async function init(){
  const colRes = await api(`
    {
      boards(ids:[${CONFIG.boardId}]){
        columns{
          id
          title
          type
          settings_str
        }
      }
    }
  `);

  columns = colRes.boards[0].columns;

  const itemRes = await api(`
    {
      boards(ids:[${CONFIG.boardId}]){
        items_page(limit:100){
          items{
            id
            name
            column_values{
              id
              text
              value
            }
          }
        }
      }
    }
  `);

  items = itemRes.boards[0].items_page.items;

  renderList();
}

/* ========= UI ========= */

function renderList(){
  $('list').innerHTML = items.map(i =>
    `<div class="item" onclick="openItem(${i.id})">${i.name}</div>`
  ).join('');
}

function openItem(id){
  const item = items.find(i=>i.id==id);

  // ONLY THESE 3
  const wanted = ['concept status','asset status','copy status'];

  const statusCols = columns.filter(c =>
    c.type === 'status' &&
    wanted.includes(c.title.toLowerCase())
  );

  let html = `<h2>${item.name}</h2>`;

  statusCols.forEach(col=>{
    const cv = item.column_values.find(v=>v.id===col.id);
    const value = getStatusLabel(col, cv);

    const options = getStatusOptions(col);

    html += `
      <div class="field">
        <label>${col.title}</label>
        <select onchange="updateStatus(${item.id}, '${col.id}', this.value)">
          <option value="">—</option>
          ${options.map(o=>`
            <option ${o===value?'selected':''}>${o}</option>
          `).join('')}
        </select>
      </div>
    `;
  });

  $('panel').innerHTML = html;
}

/* ========= UPDATE ========= */

function updateStatus(itemId, colId, value){
  api(`
    mutation {
      change_simple_column_value(
        item_id:${itemId},
        board_id:${CONFIG.boardId},
        column_id:"${colId}",
        value:"${value}"
      ){ id }
    }
  `).catch(console.error);
}

/* ========= START ========= */

init();
</script>

</body>
</html>
